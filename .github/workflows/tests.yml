name: Tests

on:
  push:
    branches:
      - '**'
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:

    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [22.x]

    steps:
      - uses: actions/checkout@v4
      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
      - run: npm ci
      - name: Run unit tests
        id: unit
        continue-on-error: true
        run: npm test

      - name: Install Playwright (Chromium)
        run: npx playwright install --with-deps chromium

      - name: Run E2E tests
        id: e2e
        continue-on-error: true
        env:
          # For fork PRs, GitHub does not expose secrets, so this resolves to '' and notifications are skipped.
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        run: npm run test:e2e

      - name: Notify Slack (unit tests only)
        # On fork PRs, secrets are unavailable; this step will be skipped.
        if: ${{ env.SLACK_WEBHOOK_URL != '' && steps.unit.outcome == 'failure' && steps.e2e.outcome != 'failure' && (github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository) }}
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        run: 'node ./scripts/slack-send.mjs "CI unit tests failed: ${{ github.repository }} ${{ github.sha }}"'

      - name: Fail job if any tests failed
        if: steps.unit.outcome == 'failure' || steps.e2e.outcome == 'failure'
        run: exit 1
